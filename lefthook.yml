min_version: 2.1.2
glob_matcher: doublestar
no_tty: true
output:
  - summary
  - failure
  - execution_out

pre-commit:
  commands:
    # Keep these globs aligned with the repo surfaces they protect.
    # If the project layout changes, update these globs and the validation scripts together.
    # `glob_matcher: doublestar` makes `**` match zero or more nested directories.
    oxc:
      glob:
        - "src/**/*.ts"
        - "scripts/**/*.ts"
        - ".claude/hooks/**/*.ts"
      run: ./node_modules/.bin/oxlint -c .oxlintrc.jsonc --fix --quiet --format=unix {staged_files} && ./node_modules/.bin/oxfmt --write -c .oxfmtrc.jsonc {staged_files}
      stage_fixed: true
    codex-hooks-check:
      glob:
        - ".codex/hooks/**/*.ts"
      run: ./node_modules/.bin/oxlint -c .oxlintrc.jsonc --quiet --format=unix {staged_files} && ./node_modules/.bin/oxfmt --check -c .oxfmtrc.jsonc {staged_files}
    product-format:
      glob:
        - "templates/**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,yml,yaml,toml,html,css}"
        - "template-sources/**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,yml,yaml,toml,html,css}"
      run: ./node_modules/.bin/oxfmt --write -c .oxfmtrc.jsonc {staged_files}
      stage_fixed: true
    product-contract:
      glob:
        - "templates/**/*"
        - "template-sources/**/*"
      run: bun run --silent test:project-contract
    typecheck:
      glob:
        - "src/**/*.ts"
        - "scripts/**/*.ts"
        - ".codex/hooks/**/*.ts"
        - ".claude/hooks/**/*.ts"
      run: bun scripts/validation/typecheck-staged.ts
    gitleaks:
      run: gitleaks protect --staged --no-banner

commit-msg:
  commands:
    commitlint:
      run: bun scripts/validation/commit-message.ts {1}

pre-push:
  commands:
    validate:
      run: bun scripts/validation/validate-push.ts
    gitleaks:
      run: gitleaks detect --no-banner
